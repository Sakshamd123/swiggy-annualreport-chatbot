services:
  - type: web
    name: swiggy-rag-backend
    runtime: python
    region: oregon
    plan: starter          # 512 MB RAM free tier — see IMPORTANT note below
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false        # set manually in Render dashboard — never commit
      - key: PYTHON_VERSION
        value: 3.11.0
    # IMPORTANT: The BGE-large embedding model (~1.3 GB) and torch (~1 GB)
    # require the "Starter Plus" plan ($7/mo, 1 GB RAM) or higher.
    # The free tier (512 MB) will OOM during the first startup.
    # Upgrade plan in Render dashboard after initial deploy.
